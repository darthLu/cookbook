workflows:
  ios-workflow:
    name: iOS Workflow

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable

      vars:
        APP_STORE_CONNECT_ALTOOL_ADDITIONAL_ARGUMENTS: "--apple-id 6779988393"


      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lindseybarnard.cookbook

    scripts:
      - flutter pub get
      - xcode-project use-profiles
      - name: Build IPA with fresh iOS build number
        script: |
          IOS_BUILD_NUMBER="${PROJECT_BUILD_NUMBER:-${BUILD_NUMBER:-}}"

          if [ -z "$IOS_BUILD_NUMBER" ]; then
            IOS_BUILD_NUMBER="$(date +%s)"
          fi

          flutter build ipa --release --build-number="$IOS_BUILD_NUMBER" --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
